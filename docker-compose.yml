version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: verifyai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-verifyai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verifyai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-verifyai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-verifyai}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
