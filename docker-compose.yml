version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: verifyai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-verifyai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verifyai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-verifyai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-verifyai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: verifyai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-verifyai}:${POSTGRES_PASSWORD:-verifyai_secret}@db:5432/${POSTGRES_DB:-verifyai}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      APP_ENV: ${APP_ENV:-production}
      GOOGLE_FACT_CHECK_API_KEY: ${GOOGLE_FACT_CHECK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MODEL_PATH: ml/models
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/ml/models:/app/ml/models:ro

volumes:
  postgres_data:
