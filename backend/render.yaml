services:
  - type: web
    name: verifyai-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: verifyai-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_FACT_CHECK_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: verifyai-db
    plan: starter
    databaseName: verifyai
    user: verifyai
