services:
  - type: web
    name: verifyai-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_FACT_CHECK_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
